<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Margin</title>
  <!-- tokens.css first: it is the base design-token layer the rest of the CSS reads -->
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="app">

    <!-- ===================== EDITOR (default) ===================== -->
    <section id="view-editor" class="view is-active">
      <header class="topbar">
        <button id="open-browser" class="icon-btn" title="All notes (home)" aria-label="All notes"></button>
        <button id="new-note" class="newbtn" title="New note (⌘/Ctrl+Enter)">+ New</button>
        <div class="spacer"></div>
        <button id="lock-toggle" class="pill-toggle" aria-label="Link note to this page"></button>
        <button id="theme-toggle" class="pill-toggle" aria-label="Toggle dark mode"></button>
        <button id="app-menu-btn" class="icon-btn" title="Settings" aria-label="Settings"></button>
      </header>

      <div class="title-row">
        <input id="title" class="title-input" placeholder="Untitled" aria-label="Note title" />
        <button id="title-edit" class="title-edit" tabindex="-1" title="Rename note" aria-label="Rename note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </button>
        <button id="note-menu-btn" class="icon-btn" title="Note actions" aria-label="Note actions">⋯</button>
      </div>

      <!-- created / edited provenance line under the title -->
      <div id="note-sub" class="note-sub"></div>

      <!-- note-level menu (kebab on title row) — single-note actions -->
      <div id="note-menu" class="menu" hidden>
        <button data-act="connected"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span><span class="mi-label">Connected pages</span><span class="mi-trail" id="conn-trail"></span></button>
        <button data-act="toc"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/></svg></span><span class="mi-label">Table of contents</span><span class="mi-trail" id="toc-trail"></span></button>
        <button data-act="mnumbers"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg></span><span class="mi-label" id="mn-label">Margin Numbers</span><span class="mi-trail" id="mn-trail"></span></button>
        <div class="menu-sep"></div>
        <button data-act="copy"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></span><span class="mi-label">Copy note text</span></button>
        <button data-act="export-md"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></span><span class="mi-label">Download</span><span class="mi-trail">.md</span></button>
        <button data-act="export-html"><span class="mi-ic"></span><span class="mi-label">Download</span><span class="mi-trail">.html</span></button>
        <button data-act="pin" id="fav-item"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span><span class="mi-label" id="pin-label">Favorite</span></button>
        <button data-act="info"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></span><span class="mi-label">Note info</span></button>
        <button data-act="prov" id="prov-item" hidden><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg></span><span class="mi-label" id="prov-label">Show paste sources</span></button>
        <div class="menu-sep"></div>
        <button data-act="delete" class="danger"><span class="mi-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></span><span class="mi-label">Delete note</span></button>
      </div>

      <div class="rt-toolbar" id="rt-toolbar">
        <div class="style-dd">
          <button id="style-trigger" class="style-trigger" title="Text style">
            <span id="style-current">Body</span><span aria-hidden="true">▾</span>
          </button>
        </div>
        <div class="size-dd">
          <button id="size-trigger" class="size-trigger" title="Text size — scales the whole note (accessibility)" aria-label="Text size">
            <span class="ic-size" aria-hidden="true"><span class="ic-size-sm">A</span><span class="ic-size-lg">A</span></span><span id="size-current" class="size-current">Regular</span><span class="caret" aria-hidden="true">▾</span>
          </button>
        </div>
        <span class="divider"></span>
        <button data-cmd="bold" title="Bold (⌘/Ctrl+B)"><b>B</b></button>
        <button data-cmd="italic" title="Italic (⌘/Ctrl+I)"><i>I</i></button>
        <button data-cmd="underline" title="Underline (⌘/Ctrl+U)"><u>U</u></button>
        <button data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
        <button id="color-btn" title="Text color & badge"><span class="ic-color" aria-hidden="true"><span class="ic-color-a">A</span><span class="ic-color-bar"></span></span><span class="caret" aria-hidden="true">▾</span></button>
        <span class="divider"></span>
        <button data-cmd="insertUnorderedList" title="Bulleted list (⌘/Ctrl+Shift+8)">•</button>
        <button data-cmd="insertOrderedList" title="Numbered list (⌘/Ctrl+Shift+7)">1.</button>
        <button id="checklist-btn" title="Checklist (⌘/Ctrl+Shift+9)">☑</button>
        <span class="tb-spacer"></span>
        <button id="plus-btn" class="cmd-pill" title="Insert block (/)"><span class="cmd-slash">/</span>cmd</button>
      </div>

      <!-- Connected pages: collapsed favicon chip row + pinned count chip (JS-rendered).
           The open drawer lives in #conn-drawer below. -->
      <div id="conn" class="conn" hidden aria-label="Connected pages"></div>

      <!-- Table of contents: translucent outline bar between the format bar and the
           editor. The frosted dropdown lives in #toc-menu below. -->
      <div id="toc-bar" class="toc-bar" hidden aria-label="Table of contents">
        <span id="toc-num" class="toc-num"></span>
        <span id="toc-current" class="toc-current"></span>
        <span id="toc-pos" class="toc-pos"></span>
        <span class="toc-chev" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
        <div class="toc-progress"><div class="toc-progress-fill"></div></div>
      </div>

      <div id="editor" class="editor" contenteditable="true" spellcheck="true" aria-label="Note body"></div>

      <footer class="statusbar">
        <button id="mn-toggle" class="mn-toggle" title="Margin Numbers" aria-label="Toggle Margin Numbers" aria-pressed="false">#</button>
        <span id="counts">0 words · 0 characters</span>
        <span class="sb-spacer"></span>
        <span id="save-status" class="save-status">Saved</span>
      </footer>

      <!-- floating layers -->
      <div id="style-menu" class="style-menu" hidden></div>
      <div id="size-menu" class="popover size-menu" hidden></div>
      <div id="color-pop" class="popover" hidden></div>
      <div id="note-info" class="popover info-pop" hidden></div>
      <div id="conn-drawer" class="conn-drawer" hidden aria-label="Connected pages"></div>
      <div id="toc-menu" class="toc-menu" hidden aria-label="Outline"></div>
      <div id="slash" class="slash" hidden></div>
      <input id="image-input" type="file" accept="image/*" hidden />
    </section>

    <!-- ===================== BROWSER (home) ===================== -->
    <section id="view-browser" class="view">
      <header class="topbar">
        <button id="back" class="icon-btn back" aria-label="Back to note">‹</button>
        <button id="new-note-2" class="newbtn" title="New note">+ New</button>
        <div class="spacer"></div>
        <button id="select-toggle" class="newbtn" title="Select notes">Select</button>
        <button id="app-menu-btn-2" class="icon-btn" title="Settings" aria-label="Settings"></button>
      </header>
      <div class="filters"><input id="search" type="search" placeholder="Search notes…" autocomplete="off" /></div>
      <div class="list-head">
        <span id="list-title" class="list-title">All notes</span>
        <label class="sort"><span>Sort</span>
          <select id="sort-select" aria-label="Sort notes">
            <option value="updated">Last updated</option>
            <option value="created">Date created</option>
            <option value="title">Title A–Z</option>
          </select>
        </label>
      </div>
      <ul id="note-list" class="note-list"></ul>
      <div id="empty" class="empty" hidden>
        <p class="empty-title">No notes yet</p>
        <p class="empty-sub">Hit <em>+ New</em>, or highlight text on any page and choose
          <em>“Save selection to Margin.”</em></p>
      </div>
      <div id="toast" class="toast" hidden><span id="toast-msg"></span><button id="toast-undo" class="toast-undo">Undo</button></div>
      <footer id="bulk-bar" class="bulk-bar" hidden>
        <button id="bulk-all" class="bulk-link">Select all</button>
        <span id="bulk-count" class="bulk-count">0 selected</span>
        <button id="bulk-merge" class="bulk-btn" disabled title="Merge selected notes into one">Merge</button>
        <button id="bulk-delete" class="bulk-del" disabled>Delete</button>
      </footer>
    </section>

    <!-- ===================== INFO (guide · release notes · roadmap) ===================== -->
    <section id="view-info" class="view">
      <header class="topbar">
        <button id="info-back" class="icon-btn back" aria-label="Back to note">‹</button>
        <span id="info-title" class="list-title">User guide</span>
      </header>
      <div class="seg" id="info-seg" hidden>
        <button data-tab="changelog" class="seg-btn is-on">Release notes</button>
        <button data-tab="roadmap" class="seg-btn">Roadmap</button>
      </div>
      <div id="info-body" class="info-body"></div>
    </section>

    <!-- app-level menu (gear) — root level so it overlays any view -->
    <div id="app-menu" class="menu app-menu" hidden>
      <button data-act="guide">User guide</button>
      <button data-act="changelog">Release notes</button>
      <button data-act="roadmap">Roadmap</button>
      <div class="menu-sep"></div>
      <button data-act="shortcut">Set keyboard shortcut…</button>
    </div>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
